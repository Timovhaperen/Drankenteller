name: Update Prices from Google Sheet

on:
  schedule:
    - cron: '0 * * * *'  # Elk uur
  workflow_dispatch:  # Ook handmatig uit te voeren

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run price updater
        run: python update_prices.py
      
      - name: Check if prices.json exists
        run: |
          if [ -f prices.json ]; then
            echo "✅ prices.json created successfully"
            cat prices.json
          else
            echo "❌ prices.json not found!"
            ls -la
          fi
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Commit and push prices.json
        run: |
          if [ -f prices.json ]; then
            git add prices.json
            git commit -m "⚙️ Update prices from Google Sheet [$(date)]" || echo "No changes to commit"
            git push
          else
            echo "No prices.json to commit"
          fi

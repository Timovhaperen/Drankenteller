name: Update Prices from Google Sheet

on:
  schedule:
    - cron: '0 * * * *'  # Elk uur
  workflow_dispatch:  # Ook handmatig uit te voeren

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run price updater
        run: python update_prices.py
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json
          git commit -m "Update prices from Google Sheet" || true
          git push
